name: ci
on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: go test ./...
      - run: go build ./...
      - run: npm pack --dry-run
        working-directory: packaging/npm-wabsignal-cli
